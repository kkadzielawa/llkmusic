services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llkmusic
      POSTGRES_USER: llkmusic
      POSTGRES_PASSWORD: llkmusic
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llkmusic -d llkmusic"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  media_data:
