name: Deploy Production

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: llkmusic
          POSTGRES_USER: llkmusic
          POSTGRES_PASSWORD: llkmusic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U llkmusic -d llkmusic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      SECRET_KEY: ci-not-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://llkmusic:llkmusic@127.0.0.1:5432/llkmusic
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      SECURE_SSL_REDIRECT: "False"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations in CI database
        run: python manage.py migrate --noinput

      - name: Run Django checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT }}
          script_stop: true
          script: |
            cd ${{ secrets.DO_APP_DIR }}
            APP_DIR=${{ secrets.DO_APP_DIR }} ./scripts/deploy-production.sh
